services:
  jupyterhub:
    build:
      context: .
      args:
        # Если сборка падает по таймауту на pip install (медленное
        # соединение до files.pythonhosted.org) — задайте зеркало через
        # .env-файл: PIP_INDEX_URL=https://... (варианты см. в README).
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: local/jupyterhub-passwd:latest
    container_name: jupyterhub
    restart: unless-stopped
    # Порт наружу не публикуется напрямую — доступ только через nginx (HTTPS),
    # см. сервис nginx ниже. Внутри docker-сети jupyterhub:8000 доступен nginx.
    expose:
      - "8000"
    # Лимит на весь контейнер целиком — общая защита хоста от переполнения
    # памяти/CPU. Это НЕ лимит на отдельного пользователя, см. jupyterhub_config.py.
    mem_limit: 4g
    cpus: 2.0
    environment:
      - TZ=Asia/Almaty
      # Лимит виртуальной памяти НА ПРОЦЕСС (ulimit -v), см. limited-launch.sh
      # и комментарий в jupyterhub_config.py. Не суммарно на пользователя.
      - JUPYTERHUB_USER_MEM_LIMIT_MB=2048
      # AI-ассистент в JupyterLab (Jupyter AI). Ключ Anthropic — из .env,
      # ничего не коммитьте с реальным ключом. Ollama работает без ключа,
      # адрес — сервис ollama из этого же compose (см. ниже).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      # Корпоративный OpenAI-совместимый эндпоинт (LiteLLM/vLLM/gateway и
      # т.п.) — тот же протокол, что у OpenAI, но свой base_url. Bearer-токен
      # и адрес задаются в .env, оба пустые/неактивны по умолчанию.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      # Google Gemini через API-ключ (Google AI Studio, не Vertex AI).
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      - ollama
    volumes:
      # Конфигурация хаба — можно править без пересборки образа
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro

      # Логотип на странице входа/шапке (см. branding/README.md). Монтируем
      # директорию целиком, а не сам файл — иначе Docker создаст пустую
      # папку на месте отсутствующего файла, если его ещё нет на хосте.
      - ./branding:/srv/jupyterhub/branding:ro

      # Список пользователей/паролей — создаётся из users.txt.example (см. README),
      # не запекается в образ, правки применяются рестартом контейнера
      - ./users.txt:/srv/jupyterhub/users.txt:ro

      # Постоянное хранилище состояния хаба (БД пользователей, сессии, cookie secret)
      - jupyterhub_data:/srv/jupyterhub/data

      # Домашние папки пользователей — данные сохраняются на хосте
      - ./notebooks/admin:/home/admin
      - ./notebooks/alice:/home/alice
      - ./notebooks/bob:/home/bob

      # Общая папка, доступная всем пользователям на чтение/запись
      - ./shared:/srv/shared

  ollama:
    image: ollama/ollama:latest
    container_name: jupyterhub-ollama
    restart: unless-stopped
    # Порт наружу не публикуется — доступен только из docker-сети как
    # http://ollama:11434 (см. OLLAMA_HOST у jupyterhub выше).
    expose:
      - "11434"
    # Лимит зависит от модели: 3B-модели ~4-6 ГБ, 7-8B ~8-10 ГБ. Поднимите
    # при необходимости под выбранную модель (см. README про `ollama pull`).
    mem_limit: 6g
    volumes:
      - ollama_data:/root/.ollama

  nginx:
    build: ./nginx
    container_name: jupyterhub-nginx
    restart: unless-stopped
    depends_on:
      - jupyterhub
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Самоподписанный сертификат генерируется автоматически при первом
      # старте (см. nginx/entrypoint.sh) и переживает пересоздание контейнера
      - nginx_certs:/etc/nginx/certs

volumes:
  jupyterhub_data:
  nginx_certs:
  ollama_data:
